services:
  horizon:
    build: .
    container_name: horizon
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
    restart: "no"
    # Horizon is a batch job. For one-time runs, use:
    # docker compose run --rm horizon
    command: ["--hours", "24"]
